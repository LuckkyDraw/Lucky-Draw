<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw — Live Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0b1e;--card:#1a1640;--border:rgba(120,100,255,0.2);
    --purple:#7c6dfa;--purple-glow:rgba(124,109,250,0.3);
    --gold:#f5c200;--text:#e8e4ff;--text-muted:#7a749a;
    --cell-hover:rgba(124,109,250,0.12);
    --font-display:'Rajdhani',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--font-display);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:2rem 1rem;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,109,250,0.12) 0%,transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 90%,rgba(245,194,0,0.06) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }
  .page{position:relative;z-index:1;width:100%;max-width:960px;}

  /* ── Header ── */
  header{text-align:center;margin-bottom:1.75rem;animation:fadeDown .6s ease both;}
  .logo-line{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;}
  .gem{width:18px;height:18px;background:var(--gold);clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);opacity:.9;}
  header h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#fff;text-shadow:0 0 40px var(--purple-glow);}
  header p.tagline{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);}

  /* ── Status banners ── */
  .banner{
    display:none;border-radius:10px;padding:.6rem 1.25rem;margin-bottom:1rem;
    font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-align:center;
  }
  #offline-bar{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:#f87171;}
  #closed-bar{background:rgba(124,109,250,0.08);border:1px solid rgba(124,109,250,0.2);color:var(--text-muted);}

  /* ── Draw panel ── */
  .draw-panel{
    display:grid;grid-template-columns:repeat(3,1fr);gap:0;
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:1.25rem 0;margin-bottom:1.5rem;
    animation:fadeUp .5s .1s ease both;
  }
  .draw-block{display:flex;flex-direction:column;gap:5px;padding:0 1.75rem;}
  .draw-block:not(:last-child){border-right:1px solid var(--border);}
  .draw-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);}
  .draw-value{font-size:1.45rem;font-weight:700;color:#fff;font-family:var(--font-mono);letter-spacing:1px;line-height:1.2;}
  .draw-value.gold{color:var(--gold);}

  /* ── Grid ── */
  .grid-wrap{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:1.25rem;overflow-x:auto;
    animation:fadeUp .5s .2s ease both;position:relative;
  }
  .loading-overlay{
    position:absolute;inset:0;background:rgba(13,11,30,.88);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    border-radius:16px;z-index:10;
  }
  .spinner{
    width:32px;height:32px;border:3px solid rgba(124,109,250,.2);
    border-top-color:var(--purple);border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  .loading-text{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);letter-spacing:2px;}
  table{width:100%;border-collapse:collapse;}
  th{
    font-family:var(--font-mono);font-size:11px;color:var(--text-muted);
    padding:6px 4px;text-align:center;letter-spacing:1px;
    border-bottom:1px solid var(--border);
  }
  .row-label{
    font-family:var(--font-mono);font-size:11px;color:var(--text-muted);
    padding:0 10px 0 0;white-space:nowrap;text-align:right;min-width:24px;
  }
  td.cell{
    border:1px solid var(--border);text-align:center;
    padding:10px 3px;
    font-family:var(--font-mono);font-size:14px;font-weight:700;
    color:#fff;letter-spacing:1px;
    cursor:default;transition:background .15s,transform .1s;
  }
  td.cell:hover{background:var(--cell-hover);transform:scale(1.05);z-index:2;border-color:var(--purple);}
  td.cell.new-flash{animation:cellFlash .9s ease forwards;}

  footer{
    text-align:center;margin-top:1.5rem;
    font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;
    animation:fadeUp .5s .3s ease both;
  }

  @keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes cellFlash{
    0%{background:rgba(124,109,250,.6);color:var(--gold);}
    70%{background:rgba(124,109,250,.15);}
    100%{background:transparent;color:#fff;}
  }

  /* ── Mobile ── */
  @media(max-width:640px){
    body{padding:1.25rem .6rem;}
    .draw-panel{
      grid-template-columns:1fr 1fr;
      padding:1rem 0;
    }
    .draw-block{padding:0 1rem;}
    .draw-block:first-child{
      grid-column:span 2;
      border-right:none;
      border-bottom:1px solid var(--border);
      padding-bottom:.9rem;
      margin-bottom:.2rem;
    }
    .draw-block:nth-child(2){border-right:1px solid var(--border);}
    .draw-value{font-size:1.2rem;}
    td.cell{font-size:11px;padding:7px 1px;}
    th,.row-label{font-size:9px;}
    .row-label{padding:0 5px 0 0;}
    .grid-wrap{padding:.85rem .5rem;}
    header h1{letter-spacing:2px;}
  }
  @media(max-width:380px){
    td.cell{font-size:9.5px;padding:5px 0;}
    .draw-value{font-size:1.05rem;}
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo-line"><div class="gem"></div><h1>Lucky Draw</h1><div class="gem"></div></div>
    <p class="tagline">Live Number Chart &mdash; Every 15 Min &bull; 9:30 AM – 9:30 PM</p>
  </header>

  <div class="banner" id="offline-bar">⚠ Connection lost — retrying…</div>
  <div class="banner" id="closed-bar">🕘 Draw is closed. Next session opens at 9:30 AM.</div>

  <div class="draw-panel">
    <div class="draw-block">
      <span class="draw-label">Current Draw</span>
      <span class="draw-value gold" id="draw-time">—</span>
    </div>
    <div class="draw-block">
      <span class="draw-label">Next Draw In</span>
      <span class="draw-value" id="countdown">—</span>
    </div>
    <div class="draw-block">
      <span class="draw-label">Next Draw At</span>
      <span class="draw-value" id="next-time">—</span>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-text">Loading draw data…</span>
    </div>
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>

  <footer>&copy; <span id="year"></span> Lucky Draw &mdash; All results are randomly generated for entertainment only.</footer>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_KEY = '$2a$10$Mvxf/bNruxfcEmuCsPNMNOs6GaNYWEkFs5xrfvD5w/tu6K3Z.UnA2';
const BIN_ID  = '69e4a9f9aaba882197157ed4';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const DAY_START = 9*60+30;   // 570  min from midnight = 9:30 AM
const DAY_END   = 21*60+30;  // 1290 min from midnight = 9:30 PM
const SLOT_MIN  = 15;

document.getElementById('year').textContent = new Date().getFullYear();

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const pad  = n => String(n).padStart(2,'0');
const pad4 = n => String(n).padStart(4,'0');

function formatTime(d){
  let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  return `${pad(h)}:${pad(m)} ${ap}`;
}

function minOfDay(d){ return d.getHours()*60+d.getMinutes(); }

function isInSession(d){
  const m=minOfDay(d);
  return m>=DAY_START && m<DAY_END;
}

/**
 * Canonical slot key = "YYYY-MM-DD-HHmm" where HH:mm is the
 * START of the current 15-min slot (strictly a multiple of 15 from 9:30).
 * Returns null outside session.
 */
function currentSlotKey(d){
  const m=minOfDay(d);
  if(m<DAY_START||m>=DAY_END) return null;
  const elapsed=m-DAY_START;
  const slotIdx=Math.floor(elapsed/SLOT_MIN);
  const slotMins=slotIdx*SLOT_MIN+DAY_START;
  const sH=Math.floor(slotMins/60), sM=slotMins%60;
  const y=d.getFullYear(), mo=pad(d.getMonth()+1), dd=pad(d.getDate());
  return `${y}-${mo}-${dd}-${pad(sH)}${pad(sM)}`;
}

/** Date object for the next 15-min boundary strictly after d. */
function getNextSlot(d){
  const m=minOfDay(d);
  if(m<DAY_START){
    const nd=new Date(d); nd.setHours(Math.floor(DAY_START/60),DAY_START%60,0,0); return nd;
  }
  if(m>=DAY_END){
    const nd=new Date(d); nd.setDate(nd.getDate()+1);
    nd.setHours(Math.floor(DAY_START/60),DAY_START%60,0,0); return nd;
  }
  const elapsed=m-DAY_START;
  const nextSlotMins=Math.ceil((elapsed+1)/SLOT_MIN)*SLOT_MIN+DAY_START;
  if(nextSlotMins>=DAY_END){
    const nd=new Date(d); nd.setDate(nd.getDate()+1);
    nd.setHours(Math.floor(DAY_START/60),DAY_START%60,0,0); return nd;
  }
  const nd=new Date(d);
  nd.setHours(Math.floor(nextSlotMins/60),nextSlotMins%60,0,0);
  return nd;
}

function randInRange(p){ return pad4(Math.floor(Math.random()*(99))+p*100); }
function generateGrid(){
  return Array.from({length:10},(_,r)=>Array.from({length:10},(_,c)=>randInRange(r*10+c)));
}

// ─── BIN I/O ─────────────────────────────────────────────────────────────────
async function fetchBin(){
  try{
    const r=await fetch(`${BIN_URL}/latest`,{
      headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'},
      cache:'no-store'
    });
    if(!r.ok) throw 0;
    setOffline(false);
    return await r.json();
  }catch{ setOffline(true); return null; }
}

async function pushBin(payload){
  try{
    const r=await fetch(BIN_URL,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(payload)
    });
    return r.ok;
  }catch{ return false; }
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function setOffline(v){ document.getElementById('offline-bar').style.display=v?'block':'none'; }
function setClosed(v){  document.getElementById('closed-bar').style.display=v?'block':'none'; }

function buildTable(nums, flash){
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  thead.innerHTML=''; tbody.innerHTML='';
  const hr=document.createElement('tr');
  const corner=document.createElement('th'); corner.style.minWidth='26px'; hr.appendChild(corner);
  for(let c=0;c<10;c++){const th=document.createElement('th');th.textContent=String.fromCharCode(65+c);hr.appendChild(th);}
  thead.appendChild(hr);
  for(let r=0;r<10;r++){
    const tr=document.createElement('tr');
    const rl=document.createElement('td');rl.className='row-label';rl.textContent=r+1;tr.appendChild(rl);
    for(let c=0;c<10;c++){
      const td=document.createElement('td');td.className='cell';
      td.textContent=(nums[r]||[])[c]||'----';
      if(flash){ td.style.animationDelay=`${(r*10+c)*10}ms`; td.classList.add('new-flash'); }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  document.getElementById('loading-overlay').style.display='none';
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let curNums    = [];
let nextNums   = [];
let lastSlot   = null;   // slot key currently shown
let swapBusy   = false;
let nextSlotDt = null;
let lastPollMs = 0;

// ─── SLOT SWAP ───────────────────────────────────────────────────────────────
async function doSwap(now, remoteData){
  if(swapBusy) return;
  swapBusy=true;

  // Use admin-staged next if present, otherwise auto-generate
  const incoming = (remoteData?.next?.length) ? remoteData.next : (nextNums.length ? nextNums : generateGrid());
  curNums    = incoming;
  nextNums   = generateGrid();  // pre-seed; admin can override before next slot
  lastSlot   = currentSlotKey(now);
  nextSlotDt = getNextSlot(now);

  document.getElementById('draw-time').textContent = formatTime(now);
  buildTable(curNums, true);

  await pushBin({
    current: curNums,
    next: nextNums,
    currentDrawTime: now.toISOString(),
    slotKey: lastSlot,
    updatedAt: now.toISOString()
  });

  setTimeout(()=>{ swapBusy=false; }, 20000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  const now     = new Date();
  const inSess  = isInSession(now);
  const slot    = currentSlotKey(now);
  nextSlotDt    = getNextSlot(now);

  setClosed(!inSess);

  const data = await fetchBin();

  if(data?.current?.length){
    curNums  = data.current;
    nextNums = data.next?.length ? data.next : generateGrid();
    lastSlot = data.slotKey || slot;

    // Catch up: if browser loads mid-session and stored slot is stale, swap now
    if(inSess && slot && lastSlot && lastSlot !== slot){
      await doSwap(now, data);
    } else {
      const dt = data.currentDrawTime ? new Date(data.currentDrawTime) : now;
      document.getElementById('draw-time').textContent = formatTime(dt);
      buildTable(curNums, false);
    }
  } else {
    if(inSess){
      curNums  = generateGrid();
      nextNums = generateGrid();
      lastSlot = slot;
      const payload={current:curNums,next:nextNums,currentDrawTime:now.toISOString(),slotKey:slot,updatedAt:now.toISOString()};
      document.getElementById('draw-time').textContent = formatTime(now);
      buildTable(curNums, false);
      await pushBin(payload);
    } else {
      buildTable(Array.from({length:10},()=>Array(10).fill('----')), false);
      document.getElementById('draw-time').textContent = 'Closed';
      document.getElementById('loading-overlay').style.display = 'none';
    }
  }

  setInterval(tick, 1000);
}

// ─── TICK ────────────────────────────────────────────────────────────────────
async function tick(){
  const now    = new Date();
  const inSess = isInSession(now);
  const slot   = currentSlotKey(now);

  setClosed(!inSess);

  // Countdown
  if(nextSlotDt){
    const diff = Math.max(0, Math.floor((nextSlotDt-now)/1000));
    const hh=Math.floor(diff/3600), mm=Math.floor((diff%3600)/60), ss=diff%60;
    document.getElementById('countdown').textContent = inSess ? `${hh}h ${pad(mm)}m ${pad(ss)}s` : '—';
    document.getElementById('next-time').textContent = formatTime(nextSlotDt);
  }

  // ── Boundary check: slot key changed → do swap ──
  if(inSess && slot && slot !== lastSlot && !swapBusy){
    const data = await fetchBin();
    await doSwap(now, data);
    return;
  }

  // ── Fast poll every 3 s ──
  if(now.getTime()-lastPollMs > 3000){
    lastPollMs = now.getTime();
    const data = await fetchBin();
    if(data){
      // Always sync staged next
      if(data.next?.length) nextNums = data.next;

      // If remote slot key advanced (another tab did the swap), just re-render
      if(data.slotKey && data.slotKey !== lastSlot && inSess && !swapBusy){
        lastSlot   = data.slotKey;
        curNums    = data.current || curNums;
        nextNums   = data.next?.length ? data.next : generateGrid();
        nextSlotDt = getNextSlot(now);
        const dt   = data.currentDrawTime ? new Date(data.currentDrawTime) : now;
        document.getElementById('draw-time').textContent = formatTime(dt);
        buildTable(curNums, true);
      }
    }
  }
}

init();
</script>
</body>
</html>
