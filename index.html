<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw — Live Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0b1e;--card:#1a1640;--border:rgba(120,100,255,0.2);
    --purple:#7c6dfa;--purple-glow:rgba(124,109,250,0.3);
    --gold:#f5c200;--text:#e8e4ff;--text-muted:#7a749a;
    --cell-hover:rgba(124,109,250,0.12);
    --font-display:'Rajdhani',sans-serif;--font-mono:'Share Tech Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,109,250,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 80% 90%,rgba(245,194,0,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .page{position:relative;z-index:1;width:100%;max-width:900px;}

  header{text-align:center;margin-bottom:2rem;animation:fadeDown .6s ease both;}
  .logo-line{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;}
  .gem{width:18px;height:18px;background:var(--gold);clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);opacity:.9;}
  header h1{font-size:clamp(2rem,5vw,3rem);font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#fff;text-shadow:0 0 40px var(--purple-glow);}
  header p.tagline{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);}

  .draw-panel{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 2rem;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;animation:fadeUp .5s .1s ease both;}
  .draw-block{display:flex;flex-direction:column;gap:4px;}
  .draw-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);}
  .draw-value{font-size:1.6rem;font-weight:700;color:#fff;font-family:var(--font-mono);letter-spacing:2px;}
  .draw-value.gold{color:var(--gold);}

  .grid-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;overflow-x:auto;animation:fadeUp .5s .2s ease both;position:relative;}
  .loading-overlay{position:absolute;inset:0;background:rgba(13,11,30,.85);display:flex;align-items:center;justify-content:center;border-radius:16px;z-index:10;font-family:var(--font-mono);font-size:13px;color:var(--text-muted);letter-spacing:2px;}
  table{width:100%;border-collapse:collapse;min-width:560px;}
  th{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:6px 4px;text-align:center;letter-spacing:1px;border-bottom:1px solid var(--border);}
  .row-label{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:0 10px 0 0;white-space:nowrap;}
  td.cell{border:1px solid var(--border);text-align:center;padding:10px 4px;font-family:var(--font-mono);font-size:14px;color:var(--text);cursor:default;transition:background .15s,transform .1s;min-width:72px;}
  td.cell:hover{background:var(--cell-hover);transform:scale(1.04);z-index:2;border-color:var(--purple);}
  td.cell.new-flash{animation:cellFlash .7s ease;}

  footer{text-align:center;margin-top:1.5rem;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:1px;animation:fadeUp .5s .3s ease both;}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes cellFlash{0%{background:rgba(124,109,250,.4)}100%{background:transparent}}
  @media(max-width:600px){.draw-panel{flex-direction:column;align-items:flex-start;}td.cell{font-size:12px;padding:8px 2px;min-width:54px;}}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo-line"><div class="gem"></div><h1>Lucky Draw</h1><div class="gem"></div></div>
    <p class="tagline">Live Number Chart &mdash; Refreshes Every 15 Minutes</p>
  </header>

  <div class="draw-panel">
    <div class="draw-block">
      <span class="draw-label">Current Draw</span>
      <span class="draw-value gold" id="draw-time">—</span>
    </div>
    <div class="draw-block">
      <span class="draw-label">Next Draw In</span>
      <span class="draw-value" id="countdown">—</span>
    </div>
    <div class="draw-block">
      <span class="draw-label">Next Draw At</span>
      <span class="draw-value" id="next-time">—</span>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="loading-overlay" id="loading-overlay">Loading draw data…</div>
    <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>

  <footer>&copy; <span id="year"></span> Lucky Draw &mdash; All results are randomly generated for entertainment only.</footer>
</div>

<script>
  const API_KEY = '$2a$10$Mvxf/bNruxfcEmuCsPNMNOs6GaNYWEkFs5xrfvD5w/tu6K3Z.UnA2';
  const BIN_ID  = '69e4a9f9aaba882197157ed4';
  const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  document.getElementById('year').textContent = new Date().getFullYear();

  let currentNumbers = [];   // what is shown right now
  let nextNumbers    = [];   // staged for next slot
  let nextDraw       = null;
  let swapped        = false; // guard: only swap once per slot

  const pad  = n => String(n).padStart(2,'0');
  const pad4 = n => String(n).padStart(4,'0');

  function formatTime(d){
    let h=d.getHours(), m=d.getMinutes();
    const ap = h>=12?'PM':'AM'; h=h%12||12;
    return `${pad(h)}:${pad(m)} ${ap}`;
  }

  // Returns the Date of the upcoming 15-min boundary
  function getNextSlot(){
    const now=new Date(), n=new Date(now);
    const rem=15-(now.getMinutes()%15);
    n.setMinutes(now.getMinutes()+rem,0,0);
    return n;
  }

  // Are we within 2 seconds past a 15-min boundary?
  function isAtBoundary(){
    const now=new Date();
    const m=now.getMinutes(), s=now.getSeconds();
    return (m%15===0 && s<3);
  }

  function randInRange(p){
    const lo=p*100, hi=lo+99;
    return pad4(Math.floor(Math.random()*(hi-lo+1))+lo);
  }
  function generateGrid(){
    return Array.from({length:10},(_,r)=>Array.from({length:10},(_,c)=>randInRange(r*10+c)));
  }

  async function fetchFromBin(){
    try{
      const r=await fetch(`${BIN_URL}/latest`,{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
      if(!r.ok) throw new Error();
      return await r.json();
    }catch{ return null; }
  }

  async function pushToBin(payload){
    try{
      await fetch(BIN_URL,{method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
        body:JSON.stringify(payload)});
    }catch{}
  }

  function buildTable(nums, flash){
    const thead=document.getElementById('thead');
    const tbody=document.getElementById('tbody');
    thead.innerHTML=''; tbody.innerHTML='';
    const hr=document.createElement('tr');
    hr.appendChild(document.createElement('th'));
    for(let c=0;c<10;c++){const th=document.createElement('th');th.textContent=String.fromCharCode(65+c);hr.appendChild(th);}
    thead.appendChild(hr);
    for(let r=0;r<10;r++){
      const tr=document.createElement('tr');
      const rl=document.createElement('td');rl.className='row-label';rl.textContent=r+1;tr.appendChild(rl);
      for(let c=0;c<10;c++){
        const td=document.createElement('td');td.className='cell';
        td.textContent=(nums[r]||[])[c]||'----';
        if(flash) td.classList.add('new-flash');
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    document.getElementById('loading-overlay').style.display='none';
  }

  async function init(){
    nextDraw = getNextSlot();
    document.getElementById('next-time').textContent = formatTime(nextDraw);

    const data = await fetchFromBin();

    if(data && data.current && data.current.length){
      currentNumbers = data.current;
      nextNumbers    = data.next || generateGrid();
      const dt = data.currentDrawTime ? new Date(data.currentDrawTime) : new Date();
      document.getElementById('draw-time').textContent = formatTime(dt);
      buildTable(currentNumbers, false);
    } else {
      // First-ever load — bootstrap both slots
      currentNumbers = generateGrid();
      nextNumbers    = generateGrid();
      const now=new Date();
      document.getElementById('draw-time').textContent = formatTime(now);
      buildTable(currentNumbers, false);
      await pushToBin({
        current: currentNumbers,
        next: nextNumbers,
        currentDrawTime: now.toISOString(),
        updatedAt: now.toISOString()
      });
    }

    setInterval(pollAndTick, 1000);
  }

  let lastPoll = 0;
  async function pollAndTick(){
    const now = new Date();

    // ── Countdown ──
    const diff = Math.max(0, Math.floor((nextDraw - now)/1000));
    const hh=Math.floor(diff/3600), mm=Math.floor((diff%3600)/60), ss=diff%60;
    document.getElementById('countdown').textContent = `${hh}h ${pad(mm)}m ${pad(ss)}s`;
    document.getElementById('next-time').textContent = formatTime(nextDraw);

    // ── Swap at boundary ──
    if(isAtBoundary() && !swapped){
      swapped = true;
      // Pull latest from cloud so we get whatever admin staged
      const data = await fetchFromBin();
      const incoming = (data && data.next && data.next.length) ? data.next : nextNumbers;
      const newNext  = generateGrid(); // fallback next

      currentNumbers = incoming;
      nextNumbers    = (data && data.nextPrepared && data.nextPrepared.length) ? data.nextPrepared : newNext;

      const slotTime = new Date();
      document.getElementById('draw-time').textContent = formatTime(slotTime);
      buildTable(currentNumbers, true);

      nextDraw = getNextSlot();

      // Promote: current ← next, next ← nextPrepared or fresh
      await pushToBin({
        current: currentNumbers,
        next: nextNumbers,
        currentDrawTime: slotTime.toISOString(),
        updatedAt: slotTime.toISOString()
      });

      setTimeout(()=>{ swapped=false; }, 5000);
      return;
    }

    if(!isAtBoundary()) swapped = false;

    // ── Poll remote every 10s (read next slot updates from admin) ──
    if(now.getTime() - lastPoll > 10000){
      lastPoll = now.getTime();
      const data = await fetchFromBin();
      if(data){
        // Only update currentNumbers if remote currentDrawTime matches our slot
        // i.e. don't swap current mid-slot
        nextNumbers = (data.next && data.next.length) ? data.next : nextNumbers;
      }
    }
  }

  init();
</script>
</body>
</html>
